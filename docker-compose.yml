version: "3.9"

services:

  aiaas_api_gateway_service:
    build: .
    container_name: aiaas_api_gateway_service
    restart: always

  nginx:
    image: nginx:latest
    container_name: nginx_proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - aiaas_api_gateway_service