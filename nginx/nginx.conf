events {}

http {

  upstream aiaas_api_gateway_service {
      server aiaas_api_gateway_service:5555;
  }

  server {
      listen 80;

      location / {
          proxy_pass http://aiaas_api_gateway_service;
          proxy_http_version 1.1;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
      }
  }
}